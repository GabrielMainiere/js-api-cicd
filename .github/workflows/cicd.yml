name: js-api-cicd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: CI - Build, Lint, Test, Quality, SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
