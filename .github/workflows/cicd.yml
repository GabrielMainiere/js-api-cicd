name: js-api-cicd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: CI - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  lint:
    name: CI - Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test_quality:
    name: CI - Test and Quality
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    defaults:
      run:
        working-directory: api-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v4.2.1
        with:
          projectBaseDir: api-js
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube skipped
        if: ${{ !(env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '') }}
        run: echo "SONAR_TOKEN ou SONAR_HOST_URL nao configurados. Etapa SonarQube ignorada."

  sast:
    name: CI - SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SAST with Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

  container:
    name: Container - Lint, Build, Scan, Push
    if: github.ref == 'refs/heads/main'
    needs: [build, lint, test_quality, sast]
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api-js/Dockerfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: ./api-js
          file: ./api-js/Dockerfile
          push: false
          load: true
          tags: js-api-cicd:${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: js-api-cicd:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Docker Hub Login
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and Push image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./api-js
          file: ./api-js/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/js-api-cicd:latest
            ${{ env.DOCKERHUB_USERNAME }}/js-api-cicd:${{ github.sha }}

  deploy_hml:
    name: CD - Deploy Homolog
    if: github.ref == 'refs/heads/main'
    needs: container
    runs-on: ubuntu-latest
    env:
      RENDER_HML_DEPLOY_HOOK: ${{ secrets.RENDER_HML_DEPLOY_HOOK }}
      HML_APP_URL: ${{ secrets.HML_APP_URL }}

    steps:
      - name: Deploy Render Homolog
        if: ${{ env.RENDER_HML_DEPLOY_HOOK != '' }}
        run: |
          status=$(curl -sS -o /tmp/render_hml_deploy_response.txt -w "%{http_code}" -X POST "$RENDER_HML_DEPLOY_HOOK")
          echo "Render HML deploy hook HTTP status: $status"
          echo "Render HML deploy hook response:"
          cat /tmp/render_hml_deploy_response.txt || true
          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "Failed to trigger Render HML deploy hook."
            exit 1
          fi

      - name: Wait for Homolog readiness
        if: ${{ env.HML_APP_URL != '' }}
        run: |
          for i in {1..30}; do
            if curl -fsS "$HML_APP_URL/healthz" > /dev/null; then
              echo "Homolog app is ready."
              exit 0
            fi
            echo "Attempt $i/30: app not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Homolog app did not become ready in time."
          exit 1

  dast_hml:
    name: CD - DAST Homolog
    if: github.ref == 'refs/heads/main'
    needs: deploy_hml
    runs-on: ubuntu-latest
    env:
      HML_APP_URL: ${{ secrets.HML_APP_URL }}

    steps:
      - name: DAST (OWASP ZAP Baseline)
        if: ${{ env.HML_APP_URL != '' }}
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.HML_APP_URL }}
          allow_issue_writing: false
          fail_action: false

      - name: DAST skipped
        if: ${{ env.HML_APP_URL == '' }}
        run: echo "HML_APP_URL nao configurada. Etapa DAST ignorada."

  deploy_prod:
    name: CD - Deploy Production
    if: github.ref == 'refs/heads/main'
    needs: dast_hml
    runs-on: ubuntu-latest
    env:
      RENDER_PROD_DEPLOY_HOOK: ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}
    environment:
      name: production

    steps:
      - name: Deploy Render Production
        if: ${{ env.RENDER_PROD_DEPLOY_HOOK != '' }}
        run: |
          status=$(curl -sS -o /tmp/render_prod_deploy_response.txt -w "%{http_code}" -X POST "$RENDER_PROD_DEPLOY_HOOK")
          echo "Render PROD deploy hook HTTP status: $status"
          echo "Render PROD deploy hook response:"
          cat /tmp/render_prod_deploy_response.txt || true
          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            echo "Failed to trigger Render PROD deploy hook."
            exit 1
          fi
